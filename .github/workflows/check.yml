name: Check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install requests ruff
      - name: Compile check
        run: python -m py_compile scripts/*.py
      - name: Lint
        run: ruff check scripts/ --no-fix --quiet || true
      - name: Validate example configs
        run: |
          python scripts/validate_artifact.py sender-profile example/sender-profile.json
          python scripts/validate_artifact.py smtp-config templates/smtp-config.example.json
